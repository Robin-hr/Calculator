name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 1. Kube-score Scan (IaC Security)
  kube-score-scan:
    name: K8s Manifest Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Kube-score
        uses: zegl/kube-score-action@v1.9.0
        with:
          manifests: Calculator-v2/calculator-deployment.yaml

  # 2. Docker Build & Push to Docker Hub
  docker-build-push:
    name: Docker Build & Push
    needs: kube-score-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Calculator-v2
          push: true
          tags: |
            hebrusrobin/calculator:latest
            hebrusrobin/calculator:${{ github.sha }}

  # 3. Deploy to Kubernetes (Minikube in Runner)
  deploy-to-k8s:
    name: Deploy to Minikube
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@master

      - name: Verify Minikube
        run: kubectl get nodes

      - name: Deploy to K8s
        run: |
          kubectl apply -f Calculator-v2/calculator-deployment.yaml
          # Force the use of the specific image we just pushed
          kubectl set image deployment/calculator-deployment calculator-app=hebrusrobin/calculator:${{ github.sha }}

      - name: Wait for Deployment
        run: kubectl rollout status deployment/calculator-deployment

      - name: Get Service URL
        run: |
          echo "--------------------------------------------------"
          echo "🚀 DEPLOYMENT SUCCESSFUL IN MINIKUBE!"
          # Minikube command to get the reachable URL of the service
          URL=$(minikube service calculator-service --url)
          echo "Your app is available at: $URL"
          echo "Note: This URL is only reachable inside the GitHub Runner."
          echo "--------------------------------------------------"
