<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALCULATOR — Premium Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #7A6230;
    --obsidian: #0A0A0A;
    --deep: #111114;
    --surface: #18181C;
    --surface2: #222228;
    --border: #2E2E36;
    --text: #F0EDE6;
    --muted: #6B6870;
    --accent: #FF6B35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--obsidian);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── LAUNCH PAGE ── */
  #launch {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--obsidian);
    overflow: hidden;
  }

  #bg3d {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  .launch-noise {
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
  }

  .launch-content {
    position: relative; z-index: 2;
    text-align: center;
    animation: fadeUp 1s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .launch-eyebrow {
    font-size: 11px; letter-spacing: 0.4em;
    color: var(--gold); margin-bottom: 24px;
    text-transform: uppercase;
    animation: fadeUp 1s 0.2s ease both;
  }

  .launch-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 14vw, 180px);
    line-height: 0.9;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 1s 0.3s ease both;
  }

  .launch-subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 0.05em;
    animation: fadeUp 1s 0.5s ease both;
  }

  .launch-divider {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 36px auto;
    animation: fadeUp 1s 0.6s ease both;
  }

  .launch-btn {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 16px 44px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
    animation: fadeUp 1s 0.8s ease both;
  }
  .launch-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .launch-btn:hover::before { transform: scaleX(1); }
  .launch-btn:hover { color: var(--obsidian); }
  .launch-btn span { position: relative; z-index: 1; }
  .launch-btn svg { position: relative; z-index: 1; transition: transform 0.3s; }
  .launch-btn:hover svg { transform: translateX(4px); }

  .launch-corner {
    position: absolute;
    width: 60px; height: 60px;
    border-color: var(--gold-dim);
    border-style: solid;
    opacity: 0.4;
  }
  .launch-corner.tl { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
  .launch-corner.tr { top: 32px; right: 32px; border-width: 1px 1px 0 0; }
  .launch-corner.bl { bottom: 32px; left: 32px; border-width: 0 0 1px 1px; }
  .launch-corner.br { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

  .launch-version {
    position: absolute;
    bottom: 40px;
    font-size: 10px; letter-spacing: 0.3em;
    color: var(--muted);
    animation: fadeUp 1s 1s ease both;
  }

  /* ── TRANSITION ── */
  .page-exit {
    animation: exitAnim 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes exitAnim {
    to { opacity: 0; transform: scale(1.05); }
  }

  /* ── CALCULATOR PAGE ── */
  #app {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    background: var(--obsidian);
    position: relative;
    overflow: hidden;
  }
  #app.visible { display: flex; }

  #appbg3d {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 0;
  }

  .calc-wrapper {
    position: relative; z-index: 2;
    animation: calcAppear 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes calcAppear {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .calc-label {
    font-size: 10px; letter-spacing: 0.5em;
    color: var(--gold-dim);
    text-align: center;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .calculator {
    width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.05),
      0 40px 80px rgba(0,0,0,0.8),
      0 0 60px rgba(201,168,76,0.04),
      inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }

  /* top decorative bar */
  .calc-topbar {
    height: 3px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-light), var(--gold-dim));
  }

  /* ── DISPLAY ── */
  .calc-display {
    padding: 28px 28px 20px;
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    position: relative;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .display-corners span {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--gold-dim);
    border-style: solid;
    opacity: 0.5;
  }
  .display-corners span.tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .display-corners span.tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
  .display-corners span.bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
  .display-corners span.br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  .display-mode {
    font-size: 9px; letter-spacing: 0.4em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .display-expr {
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
    text-align: right;
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .display-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 1;
    text-align: right;
    color: var(--text);
    letter-spacing: 0.03em;
    transition: color 0.2s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .display-main.result { color: var(--gold-light); }
  .display-main.error  { color: var(--accent); font-size: 36px; padding-top: 14px; }

  /* ── BUTTONS ── */
  .calc-buttons {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .btn {
    height: 72px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center;
  }
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.03);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover::after { opacity: 1; }
  .btn:hover { border-color: var(--gold-dim); }
  .btn:active { transform: scale(0.96); }

  .btn-ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
    transform: scale(0);
    animation: ripple 0.5s linear;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  /* operator buttons */
  .btn-op {
    background: rgba(201,168,76,0.08);
    color: var(--gold);
    border-color: rgba(201,168,76,0.2);
    font-size: 20px;
  }
  .btn-op:hover { background: rgba(201,168,76,0.14); border-color: var(--gold); }

  /* function buttons */
  .btn-fn {
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .btn-fn:hover { color: var(--text); }

  /* equals */
  .btn-eq {
    background: var(--gold);
    color: var(--obsidian);
    border-color: var(--gold);
    font-size: 24px;
    grid-row: span 2;
    height: auto;
    font-weight: 500;
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
  }
  .btn-eq:hover {
    background: var(--gold-light);
    box-shadow: 0 0 30px rgba(201,168,76,0.35);
  }
  .btn-eq::after { background: rgba(255,255,255,0.1); }

  /* zero spans 1 col now */
  .btn-zero { grid-column: span 1; }

  /* backspace */
  .btn-back {
    color: #E8C96A;
    font-size: 20px;
    border-color: rgba(232,201,106,0.2);
  }
  .btn-back:hover { border-color: #E8C96A; background: rgba(232,201,106,0.08); }

  .kb-legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px 18px;
    margin-top: 16px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0.7;
  }
  .kb-legend span { display: flex; align-items: center; gap: 5px; }
  .kbl {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--gold-dim);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    border-radius: 2px;
  }

  /* ── Keyboard hint labels ── */
  .btn kbd {
    position: absolute;
    top: 5px; right: 6px;
    font-size: 8px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    opacity: 0.5;
    pointer-events: none;
    letter-spacing: 0;
    background: none;
    border: none;
    padding: 0;
  }
  .btn-op kbd  { color: var(--gold-dim); opacity: 0.7; }
  .btn-eq kbd  { color: var(--obsidian); opacity: 0.6; }
  .btn-back kbd { color: #E8C96A; opacity: 0.6; }
  .btn-clear kbd { color: var(--accent); opacity: 0.7; }

  /* ── Key-press flash ── */
  @keyframes keyFlash {
    0%   { transform: scale(0.93); box-shadow: 0 0 18px rgba(201,168,76,0.55); border-color: var(--gold); }
    100% { transform: scale(1);    box-shadow: none; }
  }
  .btn.key-active {
    animation: keyFlash 0.16s ease-out both;
  }
  .btn-eq.key-active {
    animation: keyFlash 0.16s ease-out both;
    box-shadow: 0 0 28px rgba(201,168,76,0.7) !important;
  }

  /* active operator highlight */
  .btn-op.active-op {
    background: rgba(201,168,76,0.28);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.3);
  }

  /* clear */
  .btn-clear {
    color: var(--accent);
    border-color: rgba(255,107,53,0.2);
    font-size: 13px;
    letter-spacing: 0.1em;
  }
  .btn-clear:hover { border-color: var(--accent); background: rgba(255,107,53,0.08); }

  /* ── FOOTER ── */
  .calc-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .calc-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
  }
  .calc-history-btn {
    font-size: 9px; letter-spacing: 0.3em;
    color: var(--muted);
    background: none; border: none;
    cursor: pointer; font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    transition: color 0.2s;
    padding: 4px 8px;
  }
  .calc-history-btn:hover { color: var(--gold); }

  /* ── HISTORY PANEL ── */
  .history-panel {
    position: absolute;
    right: -220px;
    top: 0; bottom: 0;
    width: 200px;
    background: var(--deep);
    border: 1px solid var(--border);
    border-left: none;
    padding: 16px 14px;
    transition: right 0.4s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto;
  }
  .history-panel.open { right: -201px; }
  .history-title {
    font-size: 9px; letter-spacing: 0.4em;
    color: var(--gold-dim); text-transform: uppercase;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .history-item {
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .history-item:hover { opacity: 0.7; }
  .history-expr { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .history-result { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 0.05em; }
  .history-empty { font-size: 10px; color: var(--muted); font-style: italic; opacity: 0.6; }
</style>
</head>
<body>

<!-- ── LAUNCH PAGE ── -->
<div id="launch">
  <canvas id="bg3d"></canvas>
  <div class="launch-noise"></div>

  <div class="launch-corner tl"></div>
  <div class="launch-corner tr"></div>
  <div class="launch-corner bl"></div>
  <div class="launch-corner br"></div>

  <div class="launch-content">
    <p class="launch-eyebrow">Precision · Elegance · Power</p>
    <h1 class="launch-title">CALCULATOR</h1>
    <p class="launch-subtitle">Where numbers meet luxury</p>
    <div class="launch-divider"></div>
    <button class="launch-btn" onclick="enterApp()">
      <span>Enter Experience</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 7h12M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <p class="launch-version">v2.0 · PREMIUM EDITION</p>
</div>

<!-- ── CALCULATOR APP ── -->
<div id="app">
  <canvas id="appbg3d"></canvas>
  <div class="calc-wrapper">
    <p class="calc-label">Premium Calculator</p>
    <div class="calculator">
      <div class="calc-topbar"></div>

      <div class="calc-display">
        <div class="display-corners">
          <span class="tl"></span><span class="tr"></span>
          <span class="bl"></span><span class="br"></span>
        </div>
        <div class="display-mode" id="mode">STANDARD MODE</div>
        <div class="display-expr" id="expr"></div>
        <div class="display-main" id="display">0</div>
      </div>

      <div class="calc-buttons">
        <!-- Row 1 -->
        <button id="btn-clear" class="btn btn-clear" onclick="clearAll()"><span>AC</span><kbd>Esc</kbd></button>
        <button id="btn-sign"  class="btn btn-fn"    onclick="toggleSign()">+/−</button>
        <button id="btn-pct"   class="btn btn-fn"    onclick="percentage()">%<kbd>%</kbd></button>
        <button id="btn-div"   class="btn btn-op"    onclick="inputOp('/')">÷<kbd>/</kbd></button>

        <!-- Row 2 -->
        <button id="btn-7" class="btn" onclick="inputNum('7')">7<kbd>7</kbd></button>
        <button id="btn-8" class="btn" onclick="inputNum('8')">8<kbd>8</kbd></button>
        <button id="btn-9" class="btn" onclick="inputNum('9')">9<kbd>9</kbd></button>
        <button id="btn-mul" class="btn btn-op" onclick="inputOp('*')">×<kbd>*</kbd></button>

        <!-- Row 3 -->
        <button id="btn-4" class="btn" onclick="inputNum('4')">4<kbd>4</kbd></button>
        <button id="btn-5" class="btn" onclick="inputNum('5')">5<kbd>5</kbd></button>
        <button id="btn-6" class="btn" onclick="inputNum('6')">6<kbd>6</kbd></button>
        <button id="btn-sub" class="btn btn-op" onclick="inputOp('-')">−<kbd>-</kbd></button>

        <!-- Row 4 -->
        <button id="btn-1" class="btn" onclick="inputNum('1')">1<kbd>1</kbd></button>
        <button id="btn-2" class="btn" onclick="inputNum('2')">2<kbd>2</kbd></button>
        <button id="btn-3" class="btn" onclick="inputNum('3')">3<kbd>3</kbd></button>
        <button id="btn-add" class="btn btn-op" onclick="inputOp('+')">+<kbd>+</kbd></button>

        <!-- Row 5 -->
        <button id="btn-0"    class="btn btn-zero" onclick="inputNum('0')">0<kbd>0</kbd></button>
        <button id="btn-dot"  class="btn"          onclick="inputDot()">.<kbd>.</kbd></button>
        <button id="btn-back" class="btn btn-back"  onclick="backspace()">⌫<kbd>⌫</kbd></button>
        <button id="btn-eq"   class="btn btn-eq"    onclick="calculate()">=<kbd>↵</kbd></button>
      </div>

      <div class="calc-footer">
        <span class="calc-brand">CALCULATOR</span>
        <button class="calc-history-btn" onclick="toggleHistory()">History</button>
      </div>

      <div class="history-panel" id="historyPanel">
        <p class="history-title">History</p>
        <div id="historyList"><p class="history-empty">No calculations yet.</p></div>
      </div>
    </div><!-- /.calculator -->
    <div class="kb-legend">
      <span><kbd class="kbl">0–9</kbd> digits</span>
      <span><kbd class="kbl">+ - * /</kbd> operators</span>
      <span><kbd class="kbl">Enter</kbd> equals</span>
      <span><kbd class="kbl">⌫</kbd> delete</span>
      <span><kbd class="kbl">Esc</kbd> clear</span>
    </div>
  </div><!-- /.calc-wrapper -->
</div><!-- /#app -->

<script>
  // ── State ──
  let current = '0';
  let operator = null;
  let operand = null;
  let justCalc = false;
  let freshInput = false;   // true = next digit replaces current (after operator or result)
  let history = [];

  const display = document.getElementById('display');
  const exprEl  = document.getElementById('expr');

  // ── Launch transition ──
  function enterApp() {
    const launch = document.getElementById('launch');
    launch.classList.add('page-exit');
    setTimeout(() => {
      launch.style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 700);
  }

  // ── Display update ──
  function updateDisplay(val, cls = '') {
    display.textContent = formatNum(val);
    display.className = 'display-main ' + cls;
  }

  function formatNum(val) {
    const str = String(val);
    if (str.includes('e') || str.length > 12) return parseFloat(parseFloat(val).toPrecision(8)).toString();
    if (!str.includes('.')) {
      const n = parseFloat(str);
      if (!isNaN(n)) return n.toLocaleString('en-US', { maximumFractionDigits: 0 });
    }
    return str;
  }

  // ── Input handlers ──
  function inputNum(n) {
    if (freshInput || justCalc) {
      current = n;
      freshInput = false;
      justCalc = false;
      exprEl.textContent = operator ? exprEl.textContent : '';
    } else if (current === '0') {
      current = n;
    } else if (current.length >= 12) {
      return;
    } else {
      current += n;
    }
    updateDisplay(current);
  }

  function inputDot() {
    if (freshInput || justCalc) {
      current = '0.';
      freshInput = false;
      justCalc = false;
    } else if (!current.includes('.')) {
      current += '.';
    }
    updateDisplay(current);
  }

  function inputOp(op) {
    if (operator && !freshInput && !justCalc) calculate(true);
    operand = parseFloat(current);
    operator = op;
    freshInput = true;
    justCalc = false;
    const sym = { '+':'+', '-':'−', '*':'×', '/':'÷' }[op];
    exprEl.textContent = formatNum(String(operand)) + ' ' + sym;
    document.getElementById('mode').textContent = 'OPERATOR MODE';
    // Highlight active operator button
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
    event && event.target && event.target.classList.add('active-op');
  }

  function calculate(chain = false) {
    if (operator === null) return;
    const b = parseFloat(current);
    let result;
    if (operator === '+') result = operand + b;
    else if (operator === '-') result = operand - b;
    else if (operator === '*') result = operand * b;
    else if (operator === '/') {
      if (b === 0) { updateDisplay('Error', 'error'); exprEl.textContent = 'Cannot divide by zero'; operator = null; freshInput = true; return; }
      result = operand / b;
    }
    const sym = { '+':'+', '-':'−', '*':'×', '/':'÷' }[operator];
    const expr = formatNum(String(operand)) + ' ' + sym + ' ' + formatNum(String(b)) + ' =';
    if (!chain) {
      exprEl.textContent = expr;
      addHistory(expr, result);
    }
    current = String(result);
    operator = null;
    justCalc = true;
    freshInput = false;
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
    updateDisplay(current, 'result');
    document.getElementById('mode').textContent = 'RESULT';
  }

  function clearAll() {
    current = '0'; operator = null; operand = null; justCalc = false; freshInput = false;
    exprEl.textContent = '';
    document.getElementById('mode').textContent = 'STANDARD MODE';
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
    updateDisplay('0');
  }

  function backspace() {
    if (justCalc || freshInput) { clearAll(); return; }
    if (current.length <= 1 || (current.length === 2 && current.startsWith('-'))) {
      current = '0';
    } else {
      current = current.slice(0, -1);
    }
    updateDisplay(current);
  }

  function toggleSign() {
    current = String(parseFloat(current) * -1);
    updateDisplay(current);
  }

  function percentage() {
    current = String(parseFloat(current) / 100);
    updateDisplay(current);
  }

  // ── History ──
  function addHistory(expr, result) {
    history.unshift({ expr, result });
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) { list.innerHTML = '<p class="history-empty">No calculations yet.</p>'; return; }
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="recallHistory(${i})">
        <div class="history-expr">${h.expr}</div>
        <div class="history-result">${formatNum(String(h.result))}</div>
      </div>
    `).join('');
  }

  function recallHistory(i) {
    current = String(history[i].result);
    justCalc = true;
    updateDisplay(current, 'result');
  }

  let historyOpen = false;
  function toggleHistory() {
    historyOpen = !historyOpen;
    document.getElementById('historyPanel').classList.toggle('open', historyOpen);
  }

  // ── Ripple effect ──
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'btn-ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r);
      setTimeout(() => r.remove(), 500);
    });
  });

  // ── Keyboard → button mapping ──
  const keyMap = {
    '0':'btn-0','1':'btn-1','2':'btn-2','3':'btn-3','4':'btn-4',
    '5':'btn-5','6':'btn-6','7':'btn-7','8':'btn-8','9':'btn-9',
    '.':'btn-dot','+':'btn-add','-':'btn-sub','*':'btn-mul',
    '/':'btn-div','Enter':'btn-eq','=':'btn-eq',
    'Backspace':'btn-back','Escape':'btn-clear','c':'btn-clear','C':'btn-clear',
    '%':'btn-pct'
  };

  function flashBtn(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('key-active');
    setTimeout(() => el.classList.remove('key-active'), 160);
  }

  document.addEventListener('keydown', e => {
    if (document.getElementById('launch').style.display !== 'none') return;
    const id = keyMap[e.key];
    if (id) flashBtn(id);

    if ('0123456789'.includes(e.key)) inputNum(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('-');
    else if (e.key === '*') inputOp('*');
    else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') clearAll();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === '%') percentage();
  });
</script>

  const loader = new THREE.TextureLoader();
  const texture = loader.load(IMG_SRC);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;

  // ── Main 3D calc card with image texture ──
  const cardGeo = new THREE.PlaneGeometry(10, 10, 32, 32);
  const cardMat = new THREE.MeshStandardMaterial({
    map: texture,
    metalness: 0.5,
    roughness: 0.3,
    envMapIntensity: 1.0
  });
  const card = new THREE.Mesh(cardGeo, cardMat);
  card.position.set(0, 0, -2);
  scene.add(card);

  // ── Mirror/reflection card (flipped, dark, offset) ──
  const mirrorMat = new THREE.MeshStandardMaterial({
    map: texture,
    metalness: 0.8, roughness: 0.6,
    transparent: true, opacity: 0.18,
    color: new THREE.Color(0xC9A84C)
  });
  const mirror = new THREE.Mesh(cardGeo, mirrorMat);
  mirror.position.set(0, -11, -3);
  mirror.rotation.x = Math.PI;
  scene.add(mirror);

  // ── Floating ghost cards ──
  const ghosts = [];
  const ghostPositions = [
    [-14, 3, -12], [13, -4, -10], [-10, -7, -8], [11, 6, -14], [0, 8, -16]
  ];
  ghostPositions.forEach((pos, i) => {
    const g = new THREE.Mesh(cardGeo, new THREE.MeshStandardMaterial({
      map: texture,
      transparent: true, opacity: 0.06 + i * 0.02,
      metalness: 0.9, roughness: 0.2,
      color: new THREE.Color(0xC9A84C)
    }));
    g.position.set(...pos);
    g.rotation.set(
      (Math.random() - 0.5) * 0.4,
      (Math.random() - 0.5) * 0.5,
      (Math.random() - 0.5) * 0.2
    );
    g.userData = {
      floatPhase: Math.random() * Math.PI * 2,
      floatSpeed: 0.004 + Math.random() * 0.003,
      rotSpeed: (Math.random() - 0.5) * 0.0015,
      baseY: pos[1]
    };
    ghosts.push(g);
    scene.add(g);
  });

  // ── Gold frame edges ──
  const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(10.15, 10.15, 0.05));
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xC9A84C, transparent: true, opacity: 0.7 });
  const frame = new THREE.LineSegments(edgeGeo, edgeMat);
  frame.position.set(0, 0, -1.95);
  scene.add(frame);

  // ── Floating gold ring ──
  const ringGeo = new THREE.TorusGeometry(7.5, 0.05, 8, 100);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xC9A84C, transparent: true, opacity: 0.35 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = 0.6;
  scene.add(ring);

  const ring2Geo = new THREE.TorusGeometry(11, 0.03, 8, 120);
  const ring2Mat = new THREE.MeshBasicMaterial({ color: 0xE8C96A, transparent: true, opacity: 0.18 });
  const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
  ring2.rotation.x = -0.4;
  ring2.rotation.y = 0.8;
  scene.add(ring2);

  // ── Particle dust ──
  const pCount = 500;
  const pPos = new Float32Array(pCount * 3);
  for (let i = 0; i < pCount; i++) {
    pPos[i*3]   = (Math.random()-0.5)*80;
    pPos[i*3+1] = (Math.random()-0.5)*60;
    pPos[i*3+2] = (Math.random()-0.5)*40 - 10;
  }
  const pgeo = new THREE.BufferGeometry();
  pgeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const pmat = new THREE.PointsMaterial({ color: 0xC9A84C, size: 0.1, transparent: true, opacity: 0.45, sizeAttenuation: true });
  const particles = new THREE.Points(pgeo, pmat);
  scene.add(particles);

  // ── Mouse parallax ──
  const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
  document.addEventListener('mousemove', e => {
    mouse.tx = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouse.ty = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let t = 0;
  function animate() {
    if (document.getElementById('launch').style.display === 'none') return;
    requestAnimationFrame(animate);
    t += 0.01;

    // Smooth mouse
    mouse.x += (mouse.tx - mouse.x) * 0.04;
    mouse.y += (mouse.ty - mouse.y) * 0.04;

    // Main card: slow breath + tilt following mouse
    card.rotation.y = mouse.x * 0.18 + Math.sin(t * 0.4) * 0.04;
    card.rotation.x = -mouse.y * 0.12 + Math.cos(t * 0.3) * 0.02;
    card.position.z = -2 + Math.sin(t * 0.5) * 0.3;

    // Frame follows card
    frame.rotation.copy(card.rotation);
    frame.position.z = card.position.z + 0.05;

    // Mirror drape
    mirror.rotation.y = card.rotation.y * 0.4;
    mirror.position.x = mouse.x * 0.5;

    // Ghost cards
    ghosts.forEach(g => {
      g.userData.floatPhase += g.userData.floatSpeed;
      g.position.y = g.userData.baseY + Math.sin(g.userData.floatPhase) * 1.2;
      g.rotation.y += g.userData.rotSpeed;
      g.rotation.x += g.userData.rotSpeed * 0.5;
    });

    // Rings orbit
    ring.rotation.z  += 0.004;
    ring.rotation.y  += 0.002;
    ring2.rotation.z -= 0.003;
    ring2.rotation.x += 0.001;

    // Gold light pulse
    goldLight.intensity = 2.5 + Math.sin(t * 0.8) * 0.8;
    goldLight.position.x = Math.sin(t * 0.5) * 6;
    goldLight.position.y = Math.cos(t * 0.4) * 4;

    // Particles drift
    particles.rotation.y += 0.0002;

    // Camera subtle drift
    camera.position.x += (mouse.x * 1.5 - camera.position.x) * 0.025;
    camera.position.y += (-mouse.y * 1.0 - camera.position.y) * 0.025;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }
  animate();
})();

<script>
(function() {
  // Wait until app is shown before init
  function initAppBg() {
    const canvas = document.getElementById('appbg3d');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0A0A0A, 1);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0A0A0A, 0.016);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 0, 30);

    // Lights
    scene.add(new THREE.AmbientLight(0x100d06, 2));
    const gLight = new THREE.PointLight(0xC9A84C, 4, 80);
    gLight.position.set(8, 6, 18);
    scene.add(gLight);
    const gLight2 = new THREE.PointLight(0xE8C96A, 2, 60);
    gLight2.position.set(-10, -5, 12);
    scene.add(gLight2);

    // ── Deep background grid plane ──
    const gridHelper = new THREE.GridHelper(120, 30, 0xC9A84C, 0x1a1608);
    gridHelper.position.y = -16;
    gridHelper.rotation.x = 0.28;
    scene.add(gridHelper);

    // ── Floating number keys as thin boxes ──
    const keys = [];

    labels.forEach((_, i) => {
      const w = 1.4 + Math.random() * 0.6;
      const geo = new THREE.BoxGeometry(w, w, 0.08);

      const mat = new THREE.MeshStandardMaterial({
        color: isOp ? 0xC9A84C : 0x18181C,
        metalness: isOp ? 0.8 : 0.4,

        Math.random() * Math.PI,

      keys.push(mesh);

        color: 0x1e1c14, metalness: 0.6, roughness: 0.4,

      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        (Math.random()-0.5)*70, (Math.random()-0.5)*50, (Math.random()-0.5)*30-10

      mesh.userData = {
        rx: (Math.random()-0.5)*0.006, ry: (Math.random()-0.5)*0.007,

        baseY: mesh.position.y
      };
      keys.push(mesh);
      scene.add(mesh);
    }

    // ── Orbiting gold rings ──
    const rings = [
      { r: 18, tube: 0.05, tilt: 0.5,  speed: 0.0025, color: 0xC9A84C, opacity: 0.3 },
      { r: 12, tube: 0.04, tilt: -0.7, speed: -0.004, color: 0xE8C96A, opacity: 0.2 },
      { r: 24, tube: 0.03, tilt: 1.1,  speed: 0.0015, color: 0x5a3d10, opacity: 0.4 },
    ];
    const ringMeshes = rings.map(d => {
      const geo = new THREE.TorusGeometry(d.r, d.tube, 6, 120);
      const mat = new THREE.MeshBasicMaterial({ color: d.color, transparent: true, opacity: d.opacity });
      const m = new THREE.Mesh(geo, mat);
      m.rotation.x = d.tilt;
      m.rotation.y = Math.random() * Math.PI;
      scene.add(m);
      return { m, speed: d.speed };

      pPos[i*3]   = (Math.random()-0.5)*100;

    const pgeo = new THREE.BufferGeometry();
    pgeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pmat = new THREE.PointsMaterial({ color: 0xC9A84C, size: 0.09, transparent: true, opacity: 0.4, sizeAttenuation: true });
    const particles = new THREE.Points(pgeo, pmat);
    scene.add(particles);

    // Mouse parallax
    const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
    document.addEventListener('mousemove', e => {
      mouse.tx = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouse.ty = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let t = 0;
    let running = true;
    function animate() {
      if (!running) return;
      requestAnimationFrame(animate);
      t += 0.008;

      mouse.x += (mouse.tx - mouse.x) * 0.05;
      mouse.y += (mouse.ty - mouse.y) * 0.05;

      // Floating key boxes
      keys.forEach(k => {
        k.rotation.x += k.userData.rx;
        k.rotation.y += k.userData.ry;
        k.userData.floatPhase += k.userData.floatSpeed;
        k.position.y = k.userData.baseY + Math.sin(k.userData.floatPhase) * 1.0;
      });

      // Rings
      ringMeshes.forEach(r => {
        r.m.rotation.z += r.speed;
        r.m.rotation.y += r.speed * 0.25;
      });

      // Light pulse
      gLight.intensity = 3.5 + Math.sin(t * 1.1) * 1.0;
      gLight.position.x = Math.sin(t * 0.6) * 10;
      gLight.position.y = Math.cos(t * 0.4) * 6;

      // Particles
      particles.rotation.y += 0.0002;

      // Camera parallax
      camera.position.x += (mouse.x * 2.5 - camera.position.x) * 0.03;
      camera.position.y += (-mouse.y * 1.8 - camera.position.y) * 0.03;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();

    // Stop when leaving app (edge case cleanup)
    return () => { running = false; };
  }

  // Trigger init when enterApp() reveals the #app div
  const _orig = window.enterApp;
  window.enterApp = function() {
    _orig && _orig();
    setTimeout(initAppBg, 750);
  };
})();
</script>
